<style>
    /* Discord Retro Theme - Certificates Section */

    /* Preview Modal Styles */

        position: fixed;

        position: absolute;
        width: 100%;
        height: 100%;

        backdrop-filter: blur(4px);
    }

    .modal-container {
        position: relative;
        width: 90%;
        max-width: 900px;
        background-color: #2f3136;
        border: 2px solid #40444b;
        box-shadow: 8px 8px 0 #18191c;
        z-index: 10001;
        overflow: hidden;
        animation: modalScale 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

        from { transform: scale(0.9); opacity: 0; }

    .modal-close {

        top: 12px;
        right: 16px;

    .modal-content-wrapper {

    .modal-meta-section {
        display: flex;

    .meta-item {

    .meta-label {

    }

    .font-mono {

    /* Responsive preview modal */
    @media (max-width: 768px) {

</style>

<div id="previewModal" class="preview-modal">
    <div class="modal-overlay" onclick="closePreview()"></div>
    <div class="modal-container">
        <button class="modal-close" onclick="closePreview()">×</button>
        <div class="modal-content-wrapper">
            <div class="modal-image-pane">
                <img id="modalImage" src="" alt="Preview">
            </div>
            <div class="modal-details-pane">
                <h3 id="modalTitle">Certificate Title</h3>
                <div class="modal-meta-section">
                    <div id="modalIssuerContainer" class="meta-item">

<!-- ========================================
     📦 JAVASCRIPT - Auto-generates content
     ======================================== -->
<script>
(function() {
    const certificatesGrid = document.getElementById('certificatesGrid');
    const awardsGrid = document.getElementById('awardsGrid');
    
    // Resilient path detection
    const isSubdir = window.location.pathname.includes('/pages/');
    const certJsonUrl = isSubdir ? '../media/certificates/certificates.json' : 'media/certificates/certificates.json';
    const awardsJsonUrl = isSubdir ? '../media/awards/awards.json' : 'media/awards/awards.json';
    const basePath = isSubdir ? '../' : '';
        
    // Fetch Certificates
    fetch(certJsonUrl)
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
        .then(data => {
            if (certificatesGrid && data.certificates) {
                const isMobile = window.innerWidth <= 768;
                
                // Add the permanent empty placeholder card at the beginning
                const placeholderCard = document.createElement('div');
                placeholderCard.className = 'certificate-card placeholder-coming-soon';
                placeholderCard.innerHTML = `
                    <img src="${basePath}media/certificates/placeholder.svg" alt="More certificates to come" class="certificate-banner" loading="lazy">
                    <div class="certificate-content">
                        <div class="certificate-title">More Certificates to Come</div>
                        <div class="certificate-issuer">Continuous Learning</div>
                        <div class="certificate-footer">
                            <div class="certificate-date">📅 Ongoing</div>
                        </div>
                    </div>
                `;

                if (isMobile) {
                    certificatesGrid.appendChild(placeholderCard);
                    data.certificates.forEach(cert => {
                        const certCard = document.createElement('div');
                        certCard.className = 'certificate-card';
                        
                        const certImage = isSubdir && !cert.image.startsWith('http') ? '../' + cert.image : cert.image;
                        
                        certCard.innerHTML = `
                            <img src="${certImage}" alt="${cert.title}" class="certificate-banner" loading="lazy">
                            <div class="certificate-content">
                                <div class="certificate-title">${cert.title}</div>
                                <div class="certificate-issuer">${cert.issuer}</div>
                                <div class="certificate-footer">
                                    <div class="certificate-date">📅 ${cert.date}</div>
                                    ${cert.credentialId ? `<div class="certificate-id">ID: ${cert.credentialId}</div>` : ''}
                                    ${cert.verified ? '<div class="certificate-verified">✓ Verified</div>' : ''}
                                </div>
                            </div>
                        `;
                        
                        certCard.addEventListener('click', () => {
                            openPreview(cert.title, cert.issuer, cert.date, certImage, cert.credentialId, cert.verified, cert.description, cert.credentialUrl);
                        });
                        
                        certificatesGrid.appendChild(certCard);
                    });
                } else {
                    const col1 = document.createElement('div');
                    col1.className = 'masonry-col';
                    const col2 = document.createElement('div');
                    col2.className = 'masonry-col';
                    
                    certificatesGrid.appendChild(col1);
                    certificatesGrid.appendChild(col2);
                    
                    col1.appendChild(placeholderCard);
                    
                    data.certificates.forEach((cert, index) => {
                        const certCard = document.createElement('div');
                        certCard.className = 'certificate-card';
                        
                        const certImage = isSubdir && !cert.image.startsWith('http') ? '../' + cert.image : cert.image;
                        
                        certCard.innerHTML = `
                            <img src="${certImage}" alt="${cert.title}" class="certificate-banner" loading="lazy">
                            <div class="certificate-content">
                                <div class="certificate-title">${cert.title}</div>
                                <div class="certificate-issuer">${cert.issuer}</div>
                                <div class="certificate-footer">
                                    <div class="certificate-date">📅 ${cert.date}</div>
                                    ${cert.credentialId ? `<div class="certificate-id">ID: ${cert.credentialId}</div>` : ''}
                                    ${cert.verified ? '<div class="certificate-verified">✓ Verified</div>' : ''}
                                </div>
                            </div>
                        `;
                        
                        certCard.addEventListener('click', () => {
                            openPreview(cert.title, cert.issuer, cert.date, certImage, cert.credentialId, cert.verified, cert.description, cert.credentialUrl);
                        });
                        
                        // Interleave columns to keep years ordered horizontally (top of page first)
                        if (index % 2 === 0) {
                            col2.appendChild(certCard);
                        } else {
                            col1.appendChild(certCard);
                        }
                    });
                }
            }
        })
        .catch(error => {
            console.error('Error fetching certificates data:', error);
        });

    // Fetch Awards
    fetch(awardsJsonUrl)
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
        .then(data => {
            if (awardsGrid && data.awards) {
                const isMobile = window.innerWidth <= 768;
                
                // Add the permanent empty placeholder card at the beginning
                const placeholderAwardCard = document.createElement('div');
                placeholderAwardCard.className = 'certificate-card placeholder-coming-soon';
                placeholderAwardCard.innerHTML = `
                    <img src="${basePath}media/awards/placeholder.svg" alt="More awards to come" class="certificate-banner" loading="lazy">
                    <div class="certificate-content">
                        <div class="certificate-title">Coming Soon</div>
                        <div class="certificate-issuer">More achievements and awards will be listed here soon.</div>
                        <div class="certificate-footer">
                            <div class="certificate-date">📅 Ongoing</div>
                        </div>
                    </div>
                `;

                if (isMobile) {
                    awardsGrid.appendChild(placeholderAwardCard);
                    data.awards.forEach(award => {
                        const awardCard = document.createElement('div');
                        awardCard.className = 'certificate-card';
                        
                        const awardImage = isSubdir && !award.image.startsWith('http') ? '../' + award.image : award.image;
                        
                        awardCard.innerHTML = `
                            <img src="${awardImage}" alt="${award.title}" class="certificate-banner" loading="lazy">
                            <div class="certificate-content">
                                <div class="certificate-title">${award.title}</div>
                                <div class="certificate-issuer">${award.issuer}</div>
                                <div class="certificate-footer">
                                    <div class="certificate-date">📅 ${award.date}</div>
                                    ${award.verified ? '<div class="certificate-verified">✓ Verified</div>' : ''}
                                </div>
                            </div>
                        `;
                        
                        awardCard.addEventListener('click', () => {
                            openPreview(award.title, award.issuer, award.date, awardImage, null, award.verified, award.description, award.credentialUrl);
                        });
                        
                        awardsGrid.appendChild(awardCard);
                    });
                } else {
                    const col1 = document.createElement('div');
                    col1.className = 'masonry-col';
                    const col2 = document.createElement('div');
                    col2.className = 'masonry-col';
                    
                    awardsGrid.appendChild(col1);
                    awardsGrid.appendChild(col2);
                    
                    col1.appendChild(placeholderAwardCard);
                    
                    data.awards.forEach((award, index) => {
                        const awardCard = document.createElement('div');
                        awardCard.className = 'certificate-card';
                        
                        const awardImage = isSubdir && !award.image.startsWith('http') ? '../' + award.image : award.image;
                        
                        awardCard.innerHTML = `
                            <img src="${awardImage}" alt="${award.title}" class="certificate-banner" loading="lazy">
                            <div class="certificate-content">
                                <div class="certificate-title">${award.title}</div>
                                <div class="certificate-issuer">${award.issuer}</div>
                                <div class="certificate-footer">
                                    <div class="certificate-date">📅 ${award.date}</div>
                                    ${award.verified ? '<div class="certificate-verified">✓ Verified</div>' : ''}
                                </div>
                            </div>
                        `;
                        
                        awardCard.addEventListener('click', () => {
                            openPreview(award.title, award.issuer, award.date, awardImage, null, award.verified, award.description, award.credentialUrl);
                        });
                        
                        // Interleave columns to keep years ordered horizontally (top of page first)
                        if (index % 2 === 0) {
                            col2.appendChild(awardCard);
                        } else {
                            col1.appendChild(awardCard);
                        }
                    });
                }
            }
        })
        .catch(error => {
            console.error('Error fetching awards data:', error);
        });

    // Preview functions exposed to window object for onclick handler
    window.openPreview = function(title, issuer, date, image, id, verified, description, credentialUrl) {
        const modal = document.getElementById('previewModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalIssuer = document.getElementById('modalIssuer');
        const modalIssuerContainer = document.getElementById('modalIssuerContainer');
        const modalDate = document.getElementById('modalDate');
        const modalImage = document.getElementById('modalImage');
        const modalId = document.getElementById('modalId');
        const modalIdContainer = document.getElementById('modalIdContainer');
        const modalCredentialUrl = document.getElementById('modalCredentialUrl');
        const modalCredentialUrlContainer = document.getElementById('modalCredentialUrlContainer');
        const modalVerified = document.getElementById('modalVerified');
        const modalVerifiedContainer = document.getElementById('modalVerifiedContainer');
        const modalDescription = document.getElementById('modalDescription');
        const modalDescriptionContainer = document.getElementById('modalDescriptionContainer');
        
        if (!modal) return;
        
        modalTitle.textContent = title;
        modalDate.textContent = date;
        modalImage.src = image;
        
        if (issuer) {
            modalIssuer.textContent = issuer;
            modalIssuerContainer.style.display = 'flex';
        } else {
            modalIssuerContainer.style.display = 'none';
        }
        
        if (id) {
            modalId.textContent = id;
            modalIdContainer.style.display = 'flex';
        } else {
            modalIdContainer.style.display = 'none';
        }

        if (credentialUrl) {
            modalCredentialUrl.href = credentialUrl;
            modalCredentialUrlContainer.style.display = 'flex';
        } else {
            modalCredentialUrlContainer.style.display = 'none';
        }
        
        if (verified === true || verified === 'true' || verified) {
            modalVerifiedContainer.style.display = 'flex';
        } else {
            modalVerifiedContainer.style.display = 'none';
        }
        
        if (description) {
            modalDescription.textContent = description;
            modalDescriptionContainer.style.display = 'flex';
        } else {
            modalDescriptionContainer.style.display = 'none';
        }
        
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
    };
    
    window.closePreview = function() {
        const modal = document.getElementById('previewModal');
        if (modal) {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }
    };

    // Close modal on Escape key
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            window.closePreview();
        }
    });
})();
</script>

    </div>
</body>
</html>
