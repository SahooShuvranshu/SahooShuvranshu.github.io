<svg xmlns="http://www.w3.org/2000/svg" width="600" height="420" viewBox="0 0 600 420">
    <rect width="100%" height="100%" fill="#2f3136"/>
    <!-- Elegant Border -->
    <rect x="15" y="15" width="570" height="390" fill="none" stroke="#4f545c" stroke-width="4" rx="8"/>
    <rect x="25" y="25" width="550" height="370" fill="none" stroke="#5865f2" stroke-width="2" rx="4" stroke-dasharray="8 4"/>
    
    <!-- Code Bracket / Sparkle Icon -->
    <g transform="translate(300, 180) scale(1.5)">
        <!-- Left bracket < -->
        <path d="M-25,-15 L-40,0 L-25,15" fill="none" stroke="#5865f2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Right bracket > -->
        <path d="M25,-15 L40,0 L25,15" fill="none" stroke="#5865f2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Slash / -->
        <path d="M-8,22 L8,-22" fill="none" stroke="#4f545c" stroke-width="3" stroke-linecap="round"/>
    </g>
    
    <!-- Text -->
    <text x="50%" y="280" dominant-baseline="middle" text-anchor="middle" font-family="'Whitney', 'Helvetica Neue', Helvetica, sans-serif" font-size="20" font-weight="600" fill="#ffffff">COMING SOON</text>
    <text x="50%" y="315" dominant-baseline="middle" text-anchor="middle" font-family="'Whitney', 'Helvetica Neue', Helvetica, sans-serif" font-size="14" fill="#b9bbbe">Awaiting new project launch...</text>
</svg>
