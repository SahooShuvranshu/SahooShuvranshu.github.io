<svg xmlns="http://www.w3.org/2000/svg" width="600" height="420" viewBox="0 0 600 420">
    <rect width="100%" height="100%" fill="#2f3136"/>
    <!-- Elegant Border -->
    <rect x="15" y="15" width="570" height="390" fill="none" stroke="#4f545c" stroke-width="4" rx="8"/>
    <rect x="25" y="25" width="550" height="370" fill="none" stroke="#faa61a" stroke-width="2" rx="4" stroke-dasharray="8 4"/>
    
    <!-- Certificate Icon / Watermark -->
    <g transform="translate(300, 180) scale(1.5)">
        <!-- Scroll/Diploma -->
        <path d="M-20,-15 L20,-15 C23,-15 23,-5 20,-5 L-20,-5 C-23,-5 -23,-15 -20,-15 Z" fill="#202225" stroke="#faa61a" stroke-width="2.5"/>
        <path d="M-20,-5 L20,-5 C23,-5 23,5 20,5 L-20,5 C-23,5 -23,-5 -20,-5 Z" fill="#202225" stroke="#4f545c" stroke-width="2"/>
        <!-- Ribbon -->
        <path d="M-5,-5 L-2,15 L0,-5" fill="none" stroke="#faa61a" stroke-width="2"/>
        <path d="M2,-5 L5,15 L7,-5" fill="none" stroke="#faa61a" stroke-width="2"/>
    </g>
    
    <!-- Text -->
    <text x="50%" y="280" dominant-baseline="middle" text-anchor="middle" font-family="'Whitney', 'Helvetica Neue', Helvetica, sans-serif" font-size="20" font-weight="600" fill="#ffffff">COMING SOON</text>
    <text x="50%" y="315" dominant-baseline="middle" text-anchor="middle" font-family="'Whitney', 'Helvetica Neue', Helvetica, sans-serif" font-size="14" fill="#b9bbbe">Awaiting certificate upload...</text>
</svg>
